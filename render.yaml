services:
  - type: web
    name: hospital-management-api
    env: java
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -Dserver.port=$PORT -jar target/Hospital-Management-System-0.0.1-SNAPSHOT.jar
    rootDir: Backend/Hospital-Management-System
    envVars:
      - key: DB_URL
        fromDatabase:
          name: hospital_db
          property: connectionString
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
  
  - type: pserv
    name: hospital_db
    plan: free
    ipAllowList: []
    postgresVersion: 15
